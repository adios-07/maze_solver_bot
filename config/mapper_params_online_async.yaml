slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    #map_file_name: /home/adios/Robotics_WS/Ros2_WS/src/maze_solver_bot/maps/HalfMazeMap
    #map_start_pose: [0.0, 0.0, 0.0]
    #map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.05  #if 0 never publishes odometry — was 0.02, less TF spam reduces CPU
    map_update_interval: 2.0        # was 5.0 — faster map updates during exploration
    resolution: 0.03                # was 0.05 — sharper wall edges in tight corridors
    max_laser_range: 20.0           #for rastering images — was 20.0, maze walls are close
    minimum_time_interval: 0.2      # was 0.5 — process scans more frequently
    transform_timeout: 0.3          # was 0.2 — slightly more tolerant at higher speeds
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000     #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2    # was 0.5 — faster robot needs more frequent updates
    minimum_travel_heading: 0.2     # was 0.5 — captures turns in tight maze corners
    scan_buffer_size: 15            # was 10 — more scans buffered = better matching
    scan_buffer_maximum_scan_distance: 10.0   # was 10.0 — matched to maze scale
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 2.0          # was 1.5 — link scans slightly further apart
    loop_search_maximum_distance: 5.0        # was 3.0 — find loop closures further away
    do_loop_closing: true 
    loop_match_minimum_chain_size: 5         # was 10 — close loops sooner when revisiting corridors           
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.3  # was 0.35 — slightly more permissive   
    loop_match_minimum_response_fine: 0.4    # was 0.45 — slightly more permissive

    # Correlation Parameters - Correlation Parameters
    correlation_search_space_dimension: 0.3  # was 0.5 — tighter search = faster, sufficient for good odom
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Correlation Parameters - Loop Closure Parameters
    loop_search_space_dimension: 6.0         # was 8.0 — maze is tight, 6m is enough
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.3           # was 0.5 — less penalty for movement     
    angle_variance_penalty: 0.8              # was 1.0 — less penalty for rotation

    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1